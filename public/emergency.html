<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRACE — Contacts d'urgence</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #0f1117;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      -webkit-text-size-adjust: 100%;
    }
    .wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 32px 24px;
      max-width: 560px;
      margin: 0 auto;
    }
    .shield { font-size: 40px; text-align: center; margin-bottom: 16px; }
    h1 {
      font-size: 28px;
      line-height: 1.3;
      font-weight: 700;
      text-align: center;
      margin-bottom: 32px;
    }
    .contacts { display: flex; flex-direction: column; gap: 16px; }
    .contact {
      display: block;
      background: #1a2035;
      border: 1px solid #2a3350;
      border-radius: 16px;
      padding: 18px 20px;
      text-decoration: none;
      color: #ffffff;
    }
    .contact .org {
      font-size: 15px;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    .contact .number {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .note {
      margin-top: 28px;
      text-align: center;
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="shield" aria-hidden="true">🛡️</div>
    <h1>Vous êtes en sécurité. Vous avez le droit à l'aide.</h1>

    <div class="contacts">
      <a class="contact" href="tel:+23563522476">
        <div class="org">IOM Chad</div>
        <div class="number">+235 63 52 24 76</div>
      </a>
      <a class="contact" href="tel:+23522524657">
        <div class="org">Police des Mineurs</div>
        <div class="number">+235 22 52 46 57</div>
      </a>
      <a class="contact" href="tel:+23522524757">
        <div class="org">UNHCR Chad</div>
        <div class="number">+235 22 52 47 57</div>
      </a>
    </div>

    <p class="note">Appelez l'un de ces numéros à tout moment. Vous n'êtes pas seule.</p>
  </main>
</body>
</html>
